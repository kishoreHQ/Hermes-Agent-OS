apiVersion: hermes.plugin/v1
kind: provider
metadata:
  id: provider.example.budget
  version: 0.0.1
  name: Example Budget Provider
spec:
  # Still vendor-neutral — higher cost tier for routing demos.
  capabilities:
    - coding
    - tools
  local: false
  costTier: budget
  models:
    - id: budget-1
      capabilities: [coding, tools]
      costTier: budget
labels:
  hermes.driver: echo-provider
  hermes.example: "true"
